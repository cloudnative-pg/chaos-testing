apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: pg-eu
  namespace: default
  labels:
    app.kubernetes.io/name: cnpg-metrics
    app.kubernetes.io/part-of: cnpg-monitoring
    cnpg.io/cluster: pg-eu
spec:
  selector:
    matchLabels:
      cnpg.io/cluster: pg-eu
      cnpg.io/podRole: instance
  podMetricsEndpoints:
  - port: metrics
    interval: 30s
    scrapeTimeout: 10s
